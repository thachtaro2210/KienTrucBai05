server:
  port: 8083

spring:
  application:
    name: order-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/food_ordering_orders}
      # Atlas: mongodb+srv://<USER>:<PASS>@cluster.mongodb.net/food_ordering_orders
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# ── Inter-service endpoints (update IP for LAN deployment) ──────────
services:
  user-service:
    url: ${USER_SERVICE_URL:http://152.42.169.250:8081}
  food-service:
    url: ${FOOD_SERVICE_URL:http://152.42.169.250:8082}

app:
  data:
    init:
      enabled: ${DATA_INIT_ENABLED:false}   # Orders usually not pre-seeded
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://152.42.169.250:5173}

logging:
  level:
    root: INFO
    com.foodorder.orderservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
  file:
    name: logs/order-service.log
