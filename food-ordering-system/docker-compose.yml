version: '3.8'

services:
  # CSDL chung cho toàn bộ app
  mongodb:
    image: mongo:latest
    container_name: food_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - food-network

  # 1. User Service
  user-service:
    build: ./user-service
    container_name: food_user_service
    ports:
      - "8081:8081"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/food_ordering_users
      - DATA_INIT_ENABLED=true
    depends_on:
      - mongodb
    networks:
      - food-network

  # 2. Food Service
  food-service:
    build: ./food-service
    container_name: food_food_service
    ports:
      - "8082:8082"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/food_ordering_foods
      - DATA_INIT_ENABLED=true
    depends_on:
      - mongodb
    networks:
      - food-network

  # 3. Order Service
  order-service:
    build: ./order-service
    container_name: food_order_service
    ports:
      - "8083:8083"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/food_ordering_orders
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
    depends_on:
      - mongodb
      - user-service
      - food-service
    networks:
      - food-network

  # 4. Payment Service
  payment-service:
    build: ./payment-service
    container_name: food_payment_service
    ports:
      - "8084:8084"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/food_ordering_payments
      - ORDER_SERVICE_URL=http://order-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
    depends_on:
      - mongodb
      - order-service
      - notification-service
    networks:
      - food-network

  # 5. Notification Service
  notification-service:
    build: ./notification-service
    container_name: food_notification_service
    ports:
      - "8085:8085"
    networks:
      - food-network

  # 0. API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: food_api_gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    depends_on:
      - user-service
      - food-service
      - order-service
      - payment-service
    networks:
      - food-network

  # 6. Frontend
  frontend:
    build:
      context: ./frontend
      # Hardcode API Gateway public URL for deployment.
      args:
        - VITE_USER_SERVICE_URL=http://152.42.169.250:8080
        - VITE_FOOD_SERVICE_URL=http://152.42.169.250:8080
        - VITE_ORDER_SERVICE_URL=http://152.42.169.250:8080
        - VITE_PAYMENT_SERVICE_URL=http://152.42.169.250:8080
    container_name: food_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - food-network

networks:
  food-network:
    driver: bridge

volumes:
  mongodb_data:
