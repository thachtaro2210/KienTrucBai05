server:
  port: 8084

spring:
  application:
    name: payment-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/food_ordering_payments}
      # Atlas: mongodb+srv://<USER>:<PASS>@cluster.mongodb.net/food_ordering_payments
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# ── Inter-service endpoints ──────────────────────────────────────────
services:
  order-service:
    url: ${ORDER_SERVICE_URL:http://localhost:8083}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

app:
  data:
    init:
      enabled: ${DATA_INIT_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    root: INFO
    com.foodorder.paymentservice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
  file:
    name: logs/payment-service.log
